<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kopfrechnen: Dezimalzahlen</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 1rem 0;
  }

  .container {
    width: min(560px, 92vw);
    text-align: center;
  }

  h1 {
    font-size: 1.55rem;
    font-weight: 700;
    margin-bottom: 0.35rem;
    color: #93c5fd;
  }

  .subtitle {
    font-size: 0.82rem;
    color: #94a3b8;
    margin-bottom: 1.25rem;
    line-height: 1.45;
  }

  .setup { display: flex; flex-direction: column; gap: 1rem; }

  .field {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    background: #1e293b;
    padding: .85rem 1.1rem;
    border-radius: .75rem;
    flex-wrap: wrap;
  }

  .field.field-column {
    flex-direction: column;
    align-items: stretch;
    text-align: left;
  }

  .field label.field-main {
    font-size: .95rem;
    font-weight: 600;
    white-space: nowrap;
  }

  .field .inputs { display: flex; align-items: center; gap: .5rem; flex-wrap: wrap; }

  select {
    min-height: 2.5rem;
    padding: .4rem .65rem;
    border: 2px solid #334155;
    border-radius: .5rem;
    background: #0f172a;
    color: #e2e8f0;
    font-size: 1rem;
    outline: none;
    cursor: pointer;
  }
  select:focus { border-color: #60a5fa; }

  input[type="number"] {
    width: 4.25rem;
    padding: .45rem .5rem;
    border: 2px solid #334155;
    border-radius: .5rem;
    background: #0f172a;
    color: #e2e8f0;
    font-size: 1rem;
    text-align: center;
    outline: none;
    transition: border-color .2s;
  }
  input[type="number"].wide { width: 5.5rem; }
  input[type="number"]:focus { border-color: #60a5fa; }

  .type-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.45rem 0.75rem;
    margin-top: 0.35rem;
    font-size: 0.88rem;
  }

  .type-grid label {
    display: flex;
    align-items: center;
    gap: 0.45rem;
    cursor: pointer;
    color: #cbd5e1;
  }

  .type-grid input { accent-color: #3b82f6; width: 1rem; height: 1rem; }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: .5rem;
    padding: .75rem 2rem;
    border: none;
    border-radius: .6rem;
    font-size: 1.05rem;
    font-weight: 600;
    cursor: pointer;
    transition: background .2s, transform .1s;
  }
  .btn:active { transform: scale(.97); }

  .btn-primary { background: #3b82f6; color: #fff; margin-top: .35rem; }
  .btn-primary:hover { background: #2563eb; }
  .btn-secondary { background: #334155; color: #e2e8f0; }
  .btn-secondary:hover { background: #475569; }
  .btn-success { background: #22c55e; color: #fff; }
  .btn-success:hover { background: #16a34a; }

  .display { display: none; flex-direction: column; align-items: center; gap: 1.6rem; }

  .task-text {
    font-size: clamp(1.75rem, 8vw, 4.25rem);
    font-weight: 800;
    letter-spacing: .03em;
    color: #f8fafc;
    min-height: 2.5em;
    line-height: 1.2;
    padding: 0 0.25rem;
    word-break: break-word;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .task-text.compact { font-size: clamp(1.5rem, 7vw, 3.5rem); }

  .expr-row {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: 0.35em;
    vertical-align: middle;
  }

  .num-plain,
  .op-plain {
    font-weight: 800;
    align-self: center;
  }

  .kbd-hint {
    font-size: 0.78rem;
    color: #64748b;
    margin-top: -0.5rem;
  }

  .progress-bar-wrap {
    width: 100%;
    height: 6px;
    background: #1e293b;
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: #3b82f6;
    border-radius: 3px;
    transition: width .3s linear;
  }

  .counter { font-size: .9rem; color: #94a3b8; }

  .results { display: none; flex-direction: column; align-items: center; gap: 1.4rem; }

  .results h2 { font-size: 1.3rem; color: #93c5fd; }

  .task-list {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: .55rem;
    max-height: min(55vh, 420px);
    overflow-y: auto;
  }

  .task-row {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: .5rem;
    flex-wrap: wrap;
    background: #1e293b;
    padding: .65rem 1rem;
    border-radius: .6rem;
    font-size: clamp(0.95rem, 3.5vw, 1.15rem);
    font-weight: 600;
    text-align: left;
  }

  .task-row .prompt-part {
    color: #e2e8f0;
    display: inline-flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 0.25em;
  }

  .task-row .answer {
    color: #22c55e;
    visibility: hidden;
    font-weight: 700;
    display: inline-flex;
    align-items: center;
  }
  .task-row .answer.visible { visibility: visible; }

  .btn-group {
    display: flex;
    gap: .8rem;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: .4rem;
  }
</style>
<link rel="stylesheet" href="assets/style.css">
</head>
<body class="mst-page">
<nav class="mst-nav" aria-label="Hauptnavigation">
  <a href="index.html" class="mst-nav__link">Zur Übersicht</a>
</nav>

<div class="container">
  <h1>Kopfrechnen: Dezimalzahlen</h1>
  <p class="subtitle" id="presetHint">Preset für Klassenstufe 6 — alle Werte unten sind anpassbar.</p>

  <div class="setup" id="setup">

    <div class="field">
      <label class="field-main" for="grade">Klassenstufe</label>
      <div class="inputs">
        <select id="grade" aria-describedby="presetHint">
          <option value="5">5</option>
          <option value="6" selected>6</option>
          <option value="7">7</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label class="field-main" for="maxDecPlaces">Dezimalstellen (max.)</label>
      <div class="inputs">
        <input type="number" id="maxDecPlaces" value="2" min="1" max="2"
               title="Maximale Anzahl Dezimalstellen">
      </div>
    </div>

    <div class="field">
      <label class="field-main" for="maxInt">Zahlen bis (ganzzahliger Anteil)</label>
      <div class="inputs">
        <input type="number" id="maxInt" class="wide" value="99" min="1" max="9999"
               title="Maximaler ganzzahliger Anteil der Operanden">
      </div>
    </div>

    <div class="field field-column">
      <span class="field-main">Aufgabentypen</span>
      <div class="type-grid">
        <label><input type="checkbox" id="type_add" checked> Addition (2,4 + 3,1)</label>
        <label><input type="checkbox" id="type_sub" checked> Subtraktion (5,3 − 2,1)</label>
        <label><input type="checkbox" id="type_mulInt" checked> · ganze Zahl (2,4 · 3)</label>
        <label><input type="checkbox" id="type_divInt" checked> : ganze Zahl (7,2 : 4)</label>
        <label><input type="checkbox" id="type_pow10"> · oder : Zehnerpotenz</label>
        <label><input type="checkbox" id="type_mulDec"> · Dezimalzahl (0,3 · 0,4)</label>
        <label><input type="checkbox" id="type_divDec"> : Ergebnis Dezimal (3 : 4)</label>
        <label><input type="checkbox" id="type_neg"> Negative Zahlen (Kl. 7)</label>
      </div>
    </div>

    <div class="field">
      <label class="field-main">Anzahl Aufgaben</label>
      <div class="inputs">
        <input type="number" id="taskCount" value="10" min="1" max="50">
      </div>
    </div>

    <div class="field">
      <label class="field-main">Anzeigedauer (Sek.)</label>
      <div class="inputs">
        <input type="number" id="duration" value="5" min="1" max="30" step="1">
      </div>
    </div>

    <button type="button" class="btn btn-primary" onclick="startTraining()">Start</button>
  </div>

  <div class="display" id="display">
    <div class="counter" id="counter"></div>
    <div class="task-text" id="taskText"></div>
    <p class="kbd-hint">Leertaste: nächste Aufgabe · Esc: abbrechen</p>
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>
  </div>

  <div class="results" id="results">
    <h2>Übersicht</h2>
    <div class="task-list" id="taskList"></div>
    <div class="btn-group">
      <button type="button" class="btn btn-success" id="btnReveal" onclick="revealAnswers()">Lösungen anzeigen</button>
      <button type="button" class="btn btn-secondary" onclick="resetToSetup()">Neu starten</button>
    </div>
  </div>
</div>

<script>
(function () {
  'use strict';

  const GRADE_PRESETS = {
    5: {
      maxDecPlaces: 1,
      maxInt: 9,
      defaultTaskCount: 10,
      defaultDuration: 5,
      types: {
        add: true,
        sub: true,
        mulInt: true,
        divInt: true,
        pow10: true,
        mulDec: false,
        divDec: false,
        neg: false,
      },
    },
    6: {
      maxDecPlaces: 2,
      maxInt: 99,
      defaultTaskCount: 10,
      defaultDuration: 5,
      types: {
        add: true,
        sub: true,
        mulInt: true,
        divInt: true,
        pow10: false,
        mulDec: true,
        divDec: true,
        neg: false,
      },
    },
    7: {
      maxDecPlaces: 2,
      maxInt: 999,
      defaultTaskCount: 12,
      defaultDuration: 4,
      types: {
        add: true,
        sub: true,
        mulInt: true,
        divInt: true,
        pow10: false,
        mulDec: true,
        divDec: true,
        neg: true,
      },
    },
  };

  let tasks = [];
  let timer = null;
  let sequenceSkip = null;
  let sequenceAbort = null;

  // Converts a scaled integer to a German decimal string.
  // formatScaled(24, 1) → "2,4"   formatScaled(375, 2) → "3,75"
  // formatScaled(350, 2) → "3,5"  formatScaled(-75, 2) → "−0,75"
  function formatScaled(scaled, decPlaces) {
    const neg = scaled < 0;
    const abs = Math.abs(scaled);
    if (decPlaces === 0) return (neg ? '−' : '') + String(abs);
    const factor = Math.pow(10, decPlaces);
    const intPart = Math.floor(abs / factor);
    const fracPart = abs % factor;
    if (fracPart === 0) return (neg ? '−' : '') + String(intPart);
    const fracStr = String(fracPart).padStart(decPlaces, '0').replace(/0+$/, '');
    return (neg ? '−' : '') + intPart + ',' + fracStr;
  }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function numH(s) {
    return '<span class="num-plain">' + escapeHtml(s) + '</span>';
  }

  function opH(s) {
    return '<span class="op-plain">' + escapeHtml(s) + '</span>';
  }

  function exprRow(inner) {
    return '<span class="expr-row">' + inner + '</span>';
  }

  function approxTextLen(html) {
    return html.replace(/<[^>]*>/g, '').length;
  }

  function randInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  // --- task generators ---

  function genAdd(bounds) {
    const dp = bounds.decPlaces;
    const f = Math.pow(10, dp);
    const maxS = bounds.maxInt * f;
    const aS = randInt(1, maxS);
    const bS = randInt(1, maxS);
    return {
      promptHtml: exprRow(numH(formatScaled(aS, dp)) + opH(' + ') + numH(formatScaled(bS, dp))),
      answerHtml: numH(formatScaled(aS + bS, dp)),
    };
  }

  function genSub(bounds) {
    const dp = bounds.decPlaces;
    const f = Math.pow(10, dp);
    const maxS = bounds.maxInt * f;
    const aS = randInt(1, maxS);
    const bS = randInt(1, maxS);
    if (aS === bS) return null;
    if (!bounds.allowNeg && bS > aS) {
      // swap so result stays positive
      return {
        promptHtml: exprRow(numH(formatScaled(bS, dp)) + opH(' − ') + numH(formatScaled(aS, dp))),
        answerHtml: numH(formatScaled(bS - aS, dp)),
      };
    }
    return {
      promptHtml: exprRow(numH(formatScaled(aS, dp)) + opH(' − ') + numH(formatScaled(bS, dp))),
      answerHtml: numH(formatScaled(aS - bS, dp)),
    };
  }

  function genMulInt(bounds) {
    const dp = bounds.decPlaces;
    const f = Math.pow(10, dp);
    const k = randInt(2, 9);
    const maxAS = Math.min(bounds.maxInt * f, Math.floor(bounds.maxInt * 2 * f / k));
    if (maxAS < 1) return null;
    const aS = randInt(1, maxAS);
    return {
      promptHtml: exprRow(numH(formatScaled(aS, dp)) + opH(' · ') + numH(String(k))),
      answerHtml: numH(formatScaled(aS * k, dp)),
    };
  }

  function genDivInt(bounds) {
    const dp = bounds.decPlaces;
    const f = Math.pow(10, dp);
    const k = randInt(2, 9);
    // Choose result first, compute dividend = result × k
    const maxRS = Math.floor(bounds.maxInt * f / k);
    if (maxRS < 1) return null;
    const rS = randInt(1, maxRS);
    const aS = rS * k;
    return {
      promptHtml: exprRow(numH(formatScaled(aS, dp)) + opH(' : ') + numH(String(k))),
      answerHtml: numH(formatScaled(rS, dp)),
    };
  }

  function genPow10(bounds) {
    const dp = bounds.decPlaces;
    const variants = dp >= 2 ? [0, 1, 2, 3] : [0, 1];
    const variant = variants[randInt(0, variants.length - 1)];

    switch (variant) {
      case 0: { // x,y · 10 = integer
        const maxAI = Math.min(bounds.maxInt * 10, 9990);
        const aI = randInt(1, maxAI);
        return {
          promptHtml: exprRow(numH(formatScaled(aI, 1)) + opH(' · ') + numH('10')),
          answerHtml: numH(String(aI)),
        };
      }
      case 1: { // integer : 10 = x,y
        const maxN = Math.min(bounds.maxInt * 10, 9990);
        let n = randInt(11, maxN);
        if (n % 10 === 0) n = n > 10 ? n - 1 : n + 1;
        return {
          promptHtml: exprRow(numH(String(n)) + opH(' : ') + numH('10')),
          answerHtml: numH(formatScaled(n, 1)),
        };
      }
      case 2: { // x,yz · 100 = integer
        const maxAI = Math.min(bounds.maxInt * 100, 99900);
        const aI = randInt(1, maxAI);
        return {
          promptHtml: exprRow(numH(formatScaled(aI, 2)) + opH(' · ') + numH('100')),
          answerHtml: numH(String(aI)),
        };
      }
      case 3: { // integer : 100 = x,yz
        const maxN = Math.min(bounds.maxInt * 100, 99900);
        let n = randInt(1, maxN);
        if (n % 100 === 0) n = Math.max(1, n - randInt(1, 99));
        return {
          promptHtml: exprRow(numH(String(n)) + opH(' : ') + numH('100')),
          answerHtml: numH(formatScaled(n, 2)),
        };
      }
    }
    return null;
  }

  function genMulDec(bounds) {
    // 0,a · 0,b (tenths × tenths), result in hundredths
    const aI = randInt(1, 9);
    const bI = randInt(1, 9);
    return {
      promptHtml: exprRow(numH(formatScaled(aI, 1)) + opH(' · ') + numH(formatScaled(bI, 1))),
      answerHtml: numH(formatScaled(aI * bI, 2)),
    };
  }

  const NICE_DIVISORS = [2, 4, 5];

  function genDivDec(bounds) {
    const k = NICE_DIVISORS[randInt(0, NICE_DIVISORS.length - 1)];
    const maxNum = Math.min(bounds.maxInt, 20);
    let num = 1;
    for (let i = 0; i < 30; i++) {
      num = randInt(1, maxNum);
      if (num % k !== 0) break;
    }
    if (num % k === 0) return null;
    // result = num / k; k ∈ {2,4,5} always gives terminating decimal ≤ 2 places
    const rS = Math.round(num * 100 / k);
    return {
      promptHtml: exprRow(numH(String(num)) + opH(' : ') + numH(String(k))),
      answerHtml: numH(formatScaled(rS, 2)),
    };
  }

  const generators = {
    add: genAdd,
    sub: genSub,
    mulInt: genMulInt,
    divInt: genDivInt,
    pow10: genPow10,
    mulDec: genMulDec,
    divDec: genDivDec,
  };

  const ALL_TYPES = ['add', 'sub', 'mulInt', 'divInt', 'pow10', 'mulDec', 'divDec'];

  function collectEnabledTypes() {
    return ALL_TYPES.filter(function (k) {
      const el = document.getElementById('type_' + k);
      return el && el.checked;
    });
  }

  function readBounds() {
    const dp = Math.max(1, Math.min(2, parseInt(document.getElementById('maxDecPlaces').value, 10) || 2));
    const maxInt = Math.max(1, parseInt(document.getElementById('maxInt').value, 10) || 99);
    return { decPlaces: dp, maxInt: maxInt, allowNeg: document.getElementById('type_neg').checked };
  }

  function applyGradePreset() {
    const g = String(document.getElementById('grade').value);
    const p = GRADE_PRESETS[g];
    if (!p) return;
    document.getElementById('maxDecPlaces').value = p.maxDecPlaces;
    document.getElementById('maxInt').value = p.maxInt;
    document.getElementById('taskCount').value = p.defaultTaskCount;
    document.getElementById('duration').value = p.defaultDuration;
    Object.keys(p.types).forEach(function (key) {
      const el = document.getElementById('type_' + key);
      if (el) el.checked = p.types[key];
    });
    document.getElementById('presetHint').textContent =
      'Preset für Klassenstufe ' + g + ' — alle Werte unten sind anpassbar.';
  }

  document.getElementById('grade').addEventListener('change', applyGradePreset);

  window.startTraining = function () {
    const enabled = collectEnabledTypes();
    if (enabled.length === 0) {
      window.alert('Bitte mindestens einen Aufgabentyp auswählen.');
      return;
    }
    const count = Math.max(1, parseInt(document.getElementById('taskCount').value, 10) || 10);
    const dur = Math.max(1, parseInt(document.getElementById('duration').value, 10) || 5);
    const bounds = readBounds();

    tasks = [];
    for (let i = 0; i < count; i++) {
      let t = null;
      for (let tries = 0; tries < 120 && !t; tries++) {
        const key = enabled[randInt(0, enabled.length - 1)];
        t = generators[key] ? generators[key](bounds) : null;
      }
      if (!t) t = genAdd(bounds);
      tasks.push(t);
    }

    showPanel('display');
    runSequence(dur);
  };

  function showPanel(id) {
    ['setup', 'display', 'results'].forEach(function (s) {
      document.getElementById(s).style.display = s === id ? 'flex' : 'none';
    });
  }

  function teardownTrainingKeys() {
    clearTimeout(timer);
    timer = null;
    window.removeEventListener('keydown', onTrainingKeydown);
    sequenceSkip = null;
    sequenceAbort = null;
  }

  function onTrainingKeydown(e) {
    if (document.getElementById('display').style.display !== 'flex') return;
    if (e.code === 'Space') {
      e.preventDefault();
      if (sequenceSkip) sequenceSkip();
    } else if (e.code === 'Escape') {
      e.preventDefault();
      if (sequenceAbort) sequenceAbort();
    }
  }

  function runSequence(dur) {
    teardownTrainingKeys();
    let displayIndex = 0;
    const total = tasks.length;
    const taskText = document.getElementById('taskText');
    const counter = document.getElementById('counter');
    const bar = document.getElementById('progressBar');

    function presentTask() {
      clearTimeout(timer);
      timer = null;
      if (displayIndex >= total) {
        teardownTrainingKeys();
        showResults();
        return;
      }
      const t = tasks[displayIndex];
      taskText.innerHTML = t.promptHtml;
      taskText.classList.toggle('compact', approxTextLen(t.promptHtml) > 14);
      counter.textContent = 'Aufgabe ' + (displayIndex + 1) + ' von ' + total;
      bar.style.transition = 'none';
      bar.style.width = '100%';
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          bar.style.transition = 'width ' + dur + 's linear';
          bar.style.width = '0%';
        });
      });
      displayIndex++;
      timer = setTimeout(presentTask, dur * 1000);
    }

    sequenceSkip = function () { clearTimeout(timer); timer = null; presentTask(); };
    sequenceAbort = function () { teardownTrainingKeys(); showPanel('setup'); };
    window.addEventListener('keydown', onTrainingKeydown);
    presentTask();
  }

  function showResults() {
    teardownTrainingKeys();
    showPanel('results');
    const list = document.getElementById('taskList');
    list.innerHTML = '';
    document.getElementById('btnReveal').disabled = false;
    tasks.forEach(function (t) {
      const row = document.createElement('div');
      row.className = 'task-row';
      const promptSpan = document.createElement('span');
      promptSpan.className = 'prompt-part';
      promptSpan.innerHTML = t.promptHtml + '<span class="op-plain"> = </span>';
      const ans = document.createElement('span');
      ans.className = 'answer';
      ans.innerHTML = t.answerHtml;
      row.appendChild(promptSpan);
      row.appendChild(ans);
      list.appendChild(row);
    });
  }

  window.revealAnswers = function () {
    document.querySelectorAll('.answer').forEach(function (el) { el.classList.add('visible'); });
    document.getElementById('btnReveal').disabled = true;
  };

  window.resetToSetup = function () {
    teardownTrainingKeys();
    showPanel('setup');
  };

  applyGradePreset();
})();
</script>
</body>
</html>
