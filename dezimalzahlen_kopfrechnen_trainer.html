<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kopfrechnen: Dezimalzahlen</title>
<link rel="stylesheet" href="assets/style.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --yellow:       #ffea00;
    --glass-yellow: rgba(255,234,0,0.72);
    --glass-shadow: 0 24px 64px rgba(0,0,0,0.10), 0 4px 12px rgba(0,0,0,0.06);
    --blur-strong:  blur(32px) saturate(200%);
    --blur-mid:     blur(20px) saturate(180%);
    --radius-card:  28px;
    --radius-el:    18px;
    --radius-input: 14px;
    --radius-pill:  999px;
    --touch:        48px;
    --bg-frame:     #FFF1E0;
    --bg-card:      rgba(255,245,228,0.9);
    --bg-input:     rgba(255,248,235,0.96);
    --border-card:  rgba(255,210,140,0.27);
    --border-warm:  rgba(255,200,120,0.22);
  }

  body {
    font-family: system-ui, -apple-system, 'SF Pro Display', 'Segoe UI', sans-serif;
    background: var(--bg-frame);
    color: #000;
    min-height: 100vh;
    padding: 1.25rem;
    display: flex;
    justify-content: center;
    align-items: flex-start;
  }

  .container {
    width: min(520px, 100%);
    margin-top: 0.5rem;
  }

  /* ---- Site header (yellow glass) ---- */
  .site-header {
    background: var(--glass-yellow);
    -webkit-backdrop-filter: var(--blur-mid);
    backdrop-filter: var(--blur-mid);
    border: 1px solid rgba(255,220,0,0.45);
    border-bottom: 1px solid rgba(0,0,0,0.08);
    border-radius: var(--radius-card) var(--radius-card) 0 0;
    padding: 1.5rem 1.75rem 1.25rem;
  }

  .site-header h1 {
    font-size: 1.45rem;
    font-weight: 800;
    color: #000;
    letter-spacing: -0.4px;
    margin-bottom: 0.3rem;
  }

  .site-header .subtitle {
    font-size: 0.85rem;
    color: rgba(0,0,0,0.55);
    line-height: 1.45;
  }

  /* ---- Form body (cream glass) ---- */
  .form-body {
    background: var(--bg-card);
    -webkit-backdrop-filter: var(--blur-strong);
    backdrop-filter: var(--blur-strong);
    border: 1px solid var(--border-card);
    border-top: none;
    border-radius: 0 0 var(--radius-card) var(--radius-card);
    box-shadow: var(--glass-shadow);
    padding: 1.5rem 1.75rem 1.75rem;
  }

  /* ---- Setup panel ---- */
  .setup { display: flex; flex-direction: column; }

  .field {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.75rem;
    background: rgba(255,255,255,0.5);
    border: 1px solid var(--border-warm);
    border-radius: var(--radius-el);
    padding: 0.85rem 1.1rem;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }

  .field.field-column {
    flex-direction: column;
    align-items: stretch;
  }

  .field label.field-main,
  .field span.field-main {
    font-size: 0.9rem;
    font-weight: 700;
    color: #000;
    white-space: nowrap;
  }

  .field .inputs { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }

  select {
    min-height: 2.75rem;
    padding: 0.4rem 0.7rem;
    border: 1.5px solid var(--border-card);
    border-radius: var(--radius-input);
    background: var(--bg-input);
    -webkit-backdrop-filter: blur(12px);
    backdrop-filter: blur(12px);
    color: #000;
    font-size: 0.95rem;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  select:focus { border-color: var(--yellow); box-shadow: 0 0 0 3px rgba(255,234,0,0.25); }

  input[type="number"] {
    width: 4.5rem;
    min-height: 2.75rem;
    padding: 0.4rem 0.5rem;
    border: 1.5px solid var(--border-card);
    border-radius: var(--radius-input);
    background: var(--bg-input);
    -webkit-backdrop-filter: blur(12px);
    backdrop-filter: blur(12px);
    color: #000;
    font-size: 0.95rem;
    text-align: center;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input[type="number"].wide { width: 5.5rem; }
  input[type="number"]:focus { border-color: var(--yellow); box-shadow: 0 0 0 3px rgba(255,234,0,0.25); }

  .type-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.45rem 0.75rem;
    margin-top: 0.5rem;
    font-size: 0.875rem;
  }

  .type-grid label {
    display: flex;
    align-items: center;
    gap: 0.45rem;
    cursor: pointer;
    color: #595959;
  }

  .type-grid input[type="checkbox"] {
    accent-color: var(--yellow);
    width: 1rem;
    height: 1rem;
    cursor: pointer;
    flex-shrink: 0;
  }

  /* ---- Buttons ---- */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    min-height: var(--touch);
    padding: 0 1.75rem;
    border: none;
    border-radius: var(--radius-pill);
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: var(--yellow);
    color: #000;
    box-shadow: 0 4px 16px rgba(255,234,0,0.4);
    margin-top: 0.5rem;
  }
  .btn-primary:hover { background: #ffe000; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,234,0,0.5); }
  .btn-primary:active { transform: translateY(0) scale(0.97); }

  .btn-secondary {
    background: rgba(255,255,255,0.72);
    color: #000;
    border: 1px solid var(--border-card);
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .btn-secondary:hover { background: rgba(255,255,255,0.92); transform: translateY(-1px); }

  .btn-reveal {
    background: rgba(26,138,63,0.10);
    color: #1a5c30;
    border: 1.5px solid rgba(26,138,63,0.28);
    font-weight: 700;
  }
  .btn-reveal:hover { background: rgba(26,138,63,0.18); transform: translateY(-1px); }

  /* ---- Display panel ---- */
  .display { display: none; flex-direction: column; align-items: center; gap: 1.5rem; }

  .task-text {
    font-size: clamp(1.75rem, 8vw, 4.25rem);
    font-weight: 800;
    letter-spacing: -0.02em;
    color: #000;
    min-height: 2.5em;
    line-height: 1.2;
    padding: 0 0.25rem;
    word-break: break-word;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .task-text.compact { font-size: clamp(1.5rem, 7vw, 3.25rem); }

  .expr-row {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: 0.3em;
    vertical-align: middle;
  }

  .num-plain, .op-plain { font-weight: 800; align-self: center; }

  .kbd-hint {
    font-size: 0.78rem;
    color: rgba(0,0,0,0.38);
    margin-top: -0.5rem;
  }

  .progress-bar-wrap {
    width: 100%;
    height: 7px;
    background: rgba(200,160,60,0.2);
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: var(--yellow);
    border-radius: 4px;
  }

  .counter { font-size: 0.88rem; color: rgba(0,0,0,0.45); font-weight: 600; }

  /* ---- Results panel ---- */
  .results { display: none; flex-direction: column; align-items: center; gap: 1.4rem; }

  .results h2 { font-size: 1.2rem; font-weight: 700; color: #000; }

  .task-list {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 0.45rem;
    max-height: min(55vh, 420px);
    overflow-y: auto;
  }

  .task-row {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 0.5rem;
    flex-wrap: wrap;
    background: rgba(255,255,255,0.5);
    border: 1px solid var(--border-warm);
    padding: 0.65rem 1rem;
    border-radius: var(--radius-el);
    font-size: clamp(0.9rem, 3.5vw, 1.05rem);
    font-weight: 600;
    text-align: left;
  }

  .task-row .prompt-part {
    color: #000;
    display: inline-flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 0.2em;
  }

  .task-row .answer {
    color: #1a5c30;
    visibility: hidden;
    font-weight: 700;
    display: inline-flex;
    align-items: center;
  }
  .task-row .answer.visible { visibility: visible; }

  .btn-group {
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 0.25rem;
  }
</style>
</head>
<body class="mst-page">
<nav class="mst-nav" aria-label="Hauptnavigation">
  <a href="index.html" class="mst-nav__link">Zur Übersicht</a>
</nav>

<div class="container">
  <div class="site-header">
    <h1>Kopfrechnen: Dezimalzahlen</h1>
    <p class="subtitle" id="presetHint">Preset für Klassenstufe 6 — alle Werte unten sind anpassbar.</p>
  </div>

  <div class="form-body">

    <!-- Setup -->
    <div class="setup" id="setup">

      <div class="field">
        <label class="field-main" for="grade">Klassenstufe</label>
        <div class="inputs">
          <select id="grade" aria-describedby="presetHint">
            <option value="5">5</option>
            <option value="6" selected>6</option>
            <option value="7">7</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label class="field-main" for="maxDecPlaces">Dezimalstellen (max.)</label>
        <div class="inputs">
          <input type="number" id="maxDecPlaces" value="2" min="1" max="2">
        </div>
      </div>

      <div class="field">
        <label class="field-main" for="maxInt">Zahlen bis (ganzzahliger Anteil)</label>
        <div class="inputs">
          <input type="number" id="maxInt" class="wide" value="30" min="1" max="9999">
        </div>
      </div>

      <div class="field field-column">
        <span class="field-main">Aufgabentypen</span>
        <div class="type-grid">
          <label><input type="checkbox" id="type_add" checked> Addition (2,4 + 3,1)</label>
          <label><input type="checkbox" id="type_sub" checked> Subtraktion (5,3 − 2,1)</label>
          <label><input type="checkbox" id="type_mulInt" checked> · ganze Zahl (2,4 · 3)</label>
          <label><input type="checkbox" id="type_divInt" checked> : ganze Zahl (7,2 : 3)</label>
          <label><input type="checkbox" id="type_pow10"> · oder : Zehnerpotenz</label>
          <label><input type="checkbox" id="type_mulDec" checked> · Dezimalzahl (0,8 · 0,7)</label>
          <label><input type="checkbox" id="type_divDec" checked> : Dezimalzahl (3,2 : 0,8)</label>
          <label><input type="checkbox" id="type_neg"> Negative Zahlen (Kl. 7)</label>
        </div>
      </div>

      <div class="field">
        <label class="field-main" for="taskCount">Anzahl Aufgaben</label>
        <div class="inputs">
          <input type="number" id="taskCount" value="10" min="1" max="50">
        </div>
      </div>

      <div class="field">
        <label class="field-main" for="duration">Anzeigedauer (Sek.)</label>
        <div class="inputs">
          <input type="number" id="duration" value="5" min="1" max="30" step="1">
        </div>
      </div>

      <button type="button" class="btn btn-primary" onclick="startTraining()">Start</button>
    </div>

    <!-- Display -->
    <div class="display" id="display">
      <div class="counter" id="counter"></div>
      <div class="task-text" id="taskText"></div>
      <p class="kbd-hint">Leertaste: nächste Aufgabe · Esc: abbrechen</p>
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progressBar"></div>
      </div>
    </div>

    <!-- Results -->
    <div class="results" id="results">
      <h2>Übersicht</h2>
      <div class="task-list" id="taskList"></div>
      <div class="btn-group">
        <button type="button" class="btn btn-reveal" id="btnReveal" onclick="revealAnswers()">Lösungen anzeigen</button>
        <button type="button" class="btn btn-secondary" onclick="resetToSetup()">Neu starten</button>
      </div>
    </div>

  </div>
</div>

<script>
(function () {
  'use strict';

  const GRADE_PRESETS = {
    5: {
      maxDecPlaces: 1,
      maxInt: 9,
      defaultTaskCount: 10,
      defaultDuration: 5,
      types: { add: true, sub: true, mulInt: true, divInt: true, pow10: true, mulDec: false, divDec: false, neg: false },
    },
    6: {
      maxDecPlaces: 2,
      maxInt: 30,
      defaultTaskCount: 10,
      defaultDuration: 5,
      types: { add: true, sub: true, mulInt: true, divInt: true, pow10: false, mulDec: true, divDec: true, neg: false },
    },
    7: {
      maxDecPlaces: 2,
      maxInt: 99,
      defaultTaskCount: 12,
      defaultDuration: 4,
      types: { add: true, sub: true, mulInt: true, divInt: true, pow10: false, mulDec: true, divDec: true, neg: true },
    },
  };

  let tasks = [];
  let timer = null;
  let sequenceSkip = null;
  let sequenceAbort = null;

  // Converts scaled integer to German decimal string.
  // formatScaled(24, 1) → "2,4"  formatScaled(350, 2) → "3,5"  formatScaled(-75, 2) → "−0,75"
  function formatScaled(scaled, decPlaces) {
    const neg = scaled < 0;
    const abs = Math.abs(scaled);
    if (decPlaces === 0) return (neg ? '−' : '') + String(abs);
    const factor = Math.pow(10, decPlaces);
    const intPart = Math.floor(abs / factor);
    const fracPart = abs % factor;
    if (fracPart === 0) return (neg ? '−' : '') + String(intPart);
    const fracStr = String(fracPart).padStart(decPlaces, '0').replace(/0+$/, '');
    return (neg ? '−' : '') + intPart + ',' + fracStr;
  }

  function escapeHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function numH(s)   { return '<span class="num-plain">' + escapeHtml(s) + '</span>'; }
  function opH(s)    { return '<span class="op-plain">' + escapeHtml(s) + '</span>'; }
  function exprRow(inner) { return '<span class="expr-row">' + inner + '</span>'; }
  function approxTextLen(html) { return html.replace(/<[^>]*>/g, '').length; }
  function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

  // --- Task generators ---

  function genAdd(bounds) {
    const dp = bounds.decPlaces;
    const f  = Math.pow(10, dp);
    const maxS = bounds.maxInt * f;
    const aS = randInt(1, maxS);
    const bS = randInt(1, maxS);
    return {
      promptHtml: exprRow(numH(formatScaled(aS, dp)) + opH(' + ') + numH(formatScaled(bS, dp))),
      answerHtml: numH(formatScaled(aS + bS, dp)),
    };
  }

  function genSub(bounds) {
    const dp = bounds.decPlaces;
    const f  = Math.pow(10, dp);
    const maxS = bounds.maxInt * f;
    const aS = randInt(1, maxS);
    const bS = randInt(1, maxS);
    if (aS === bS) return null;
    if (!bounds.allowNeg && bS > aS) {
      return {
        promptHtml: exprRow(numH(formatScaled(bS, dp)) + opH(' − ') + numH(formatScaled(aS, dp))),
        answerHtml: numH(formatScaled(bS - aS, dp)),
      };
    }
    return {
      promptHtml: exprRow(numH(formatScaled(aS, dp)) + opH(' − ') + numH(formatScaled(bS, dp))),
      answerHtml: numH(formatScaled(aS - bS, dp)),
    };
  }

  // Decimal (1 dp, ≤ 9,9) × integer (2–9) — e.g. 2,4 · 3 = 7,2
  function genMulInt(bounds) {
    const k    = randInt(2, 9);
    const maxA = Math.min(bounds.maxInt, 9) * 10; // stored as tenths, e.g. 90 = 9.0
    if (maxA < 1) return null;
    const aI = randInt(1, maxA);
    return {
      promptHtml: exprRow(numH(formatScaled(aI, 1)) + opH(' · ') + numH(String(k))),
      answerHtml: numH(formatScaled(aI * k, 1)),
    };
  }

  // Decimal (1 dp) ÷ integer (2–9), result ≤ 9,9 — e.g. 7,2 : 3 = 2,4
  function genDivInt(bounds) {
    const k    = randInt(2, 9);
    const maxR = Math.min(bounds.maxInt, 9) * 10; // result in tenths
    if (maxR < 1) return null;
    const rI = randInt(1, maxR);
    const aI = rI * k;
    return {
      promptHtml: exprRow(numH(formatScaled(aI, 1)) + opH(' : ') + numH(String(k))),
      answerHtml: numH(formatScaled(rI, 1)),
    };
  }

  function genPow10(bounds) {
    const dp       = bounds.decPlaces;
    const variants = dp >= 2 ? [0, 1, 2, 3] : [0, 1];
    const variant  = variants[randInt(0, variants.length - 1)];
    switch (variant) {
      case 0: {
        const maxAI = Math.min(bounds.maxInt * 10, 9990);
        const aI = randInt(1, maxAI);
        return { promptHtml: exprRow(numH(formatScaled(aI, 1)) + opH(' · ') + numH('10')), answerHtml: numH(String(aI)) };
      }
      case 1: {
        const maxN = Math.min(bounds.maxInt * 10, 9990);
        let n = randInt(11, maxN);
        if (n % 10 === 0) n = n > 10 ? n - 1 : n + 1;
        return { promptHtml: exprRow(numH(String(n)) + opH(' : ') + numH('10')), answerHtml: numH(formatScaled(n, 1)) };
      }
      case 2: {
        const maxAI = Math.min(bounds.maxInt * 100, 99900);
        const aI = randInt(1, maxAI);
        return { promptHtml: exprRow(numH(formatScaled(aI, 2)) + opH(' · ') + numH('100')), answerHtml: numH(String(aI)) };
      }
      case 3: {
        const maxN = Math.min(bounds.maxInt * 100, 99900);
        let n = randInt(1, maxN);
        if (n % 100 === 0) n = Math.max(1, n - randInt(1, 99));
        return { promptHtml: exprRow(numH(String(n)) + opH(' : ') + numH('100')), answerHtml: numH(formatScaled(n, 2)) };
      }
    }
    return null;
  }

  // Decimal × decimal — e.g. 0,8 · 0,7 = 0,56  or  2,4 · 0,5 = 1,2
  function genMulDec(bounds) {
    const aI = randInt(1, 24); // 0,1 – 2,4
    const bI = randInt(1, 9);  // 0,1 – 0,9
    return {
      promptHtml: exprRow(numH(formatScaled(aI, 1)) + opH(' · ') + numH(formatScaled(bI, 1))),
      answerHtml: numH(formatScaled(aI * bI, 2)),
    };
  }

  // Decimal ÷ decimal with integer result — e.g. 3,2 : 0,8 = 4
  // Strategy: choose result R ∈ {1..10}, then divisor bI/10 ∈ {0,1..0,9}.
  function genDivDec(bounds) {
    const R  = randInt(1, 10);
    const bI = randInt(1, 9);
    const aI = R * bI;
    return {
      promptHtml: exprRow(numH(formatScaled(aI, 1)) + opH(' : ') + numH(formatScaled(bI, 1))),
      answerHtml: numH(String(R)),
    };
  }

  const generators = { add: genAdd, sub: genSub, mulInt: genMulInt, divInt: genDivInt, pow10: genPow10, mulDec: genMulDec, divDec: genDivDec };
  const ALL_TYPES  = ['add', 'sub', 'mulInt', 'divInt', 'pow10', 'mulDec', 'divDec'];

  function collectEnabledTypes() {
    return ALL_TYPES.filter(function (k) {
      const el = document.getElementById('type_' + k);
      return el && el.checked;
    });
  }

  function readBounds() {
    const dp     = Math.max(1, Math.min(2, parseInt(document.getElementById('maxDecPlaces').value, 10) || 2));
    const maxInt = Math.max(1, parseInt(document.getElementById('maxInt').value, 10) || 30);
    return { decPlaces: dp, maxInt: maxInt, allowNeg: document.getElementById('type_neg').checked };
  }

  function applyGradePreset() {
    const g = String(document.getElementById('grade').value);
    const p = GRADE_PRESETS[g];
    if (!p) return;
    document.getElementById('maxDecPlaces').value = p.maxDecPlaces;
    document.getElementById('maxInt').value       = p.maxInt;
    document.getElementById('taskCount').value    = p.defaultTaskCount;
    document.getElementById('duration').value     = p.defaultDuration;
    Object.keys(p.types).forEach(function (key) {
      const el = document.getElementById('type_' + key);
      if (el) el.checked = p.types[key];
    });
    document.getElementById('presetHint').textContent =
      'Preset für Klassenstufe ' + g + ' — alle Werte unten sind anpassbar.';
  }

  document.getElementById('grade').addEventListener('change', applyGradePreset);

  window.startTraining = function () {
    const enabled = collectEnabledTypes();
    if (enabled.length === 0) { window.alert('Bitte mindestens einen Aufgabentyp auswählen.'); return; }
    const count  = Math.max(1, parseInt(document.getElementById('taskCount').value, 10) || 10);
    const dur    = Math.max(1, parseInt(document.getElementById('duration').value, 10) || 5);
    const bounds = readBounds();

    tasks = [];
    for (let i = 0; i < count; i++) {
      let t = null;
      for (let tries = 0; tries < 120 && !t; tries++) {
        const key = enabled[randInt(0, enabled.length - 1)];
        t = generators[key] ? generators[key](bounds) : null;
      }
      if (!t) t = genAdd(bounds);
      tasks.push(t);
    }

    showPanel('display');
    runSequence(dur);
  };

  function showPanel(id) {
    ['setup', 'display', 'results'].forEach(function (s) {
      document.getElementById(s).style.display = s === id ? 'flex' : 'none';
    });
  }

  function teardownTrainingKeys() {
    clearTimeout(timer); timer = null;
    window.removeEventListener('keydown', onTrainingKeydown);
    sequenceSkip  = null;
    sequenceAbort = null;
  }

  function onTrainingKeydown(e) {
    if (document.getElementById('display').style.display !== 'flex') return;
    if (e.code === 'Space')  { e.preventDefault(); if (sequenceSkip)  sequenceSkip(); }
    else if (e.code === 'Escape') { e.preventDefault(); if (sequenceAbort) sequenceAbort(); }
  }

  function runSequence(dur) {
    teardownTrainingKeys();
    let displayIndex = 0;
    const total    = tasks.length;
    const taskText = document.getElementById('taskText');
    const counter  = document.getElementById('counter');
    const bar      = document.getElementById('progressBar');

    function presentTask() {
      clearTimeout(timer); timer = null;
      if (displayIndex >= total) { teardownTrainingKeys(); showResults(); return; }
      const t = tasks[displayIndex];
      taskText.innerHTML = t.promptHtml;
      taskText.classList.toggle('compact', approxTextLen(t.promptHtml) > 14);
      counter.textContent = 'Aufgabe ' + (displayIndex + 1) + ' von ' + total;
      bar.style.transition = 'none';
      bar.style.width      = '100%';
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          bar.style.transition = 'width ' + dur + 's linear';
          bar.style.width      = '0%';
        });
      });
      displayIndex++;
      timer = setTimeout(presentTask, dur * 1000);
    }

    sequenceSkip  = function () { clearTimeout(timer); timer = null; presentTask(); };
    sequenceAbort = function () { teardownTrainingKeys(); showPanel('setup'); };
    window.addEventListener('keydown', onTrainingKeydown);
    presentTask();
  }

  function showResults() {
    teardownTrainingKeys();
    showPanel('results');
    const list = document.getElementById('taskList');
    list.innerHTML = '';
    document.getElementById('btnReveal').disabled = false;
    tasks.forEach(function (t) {
      const row = document.createElement('div');
      row.className = 'task-row';
      const promptSpan = document.createElement('span');
      promptSpan.className = 'prompt-part';
      promptSpan.innerHTML = t.promptHtml + '<span class="op-plain"> = </span>';
      const ans = document.createElement('span');
      ans.className = 'answer';
      ans.innerHTML = t.answerHtml;
      row.appendChild(promptSpan);
      row.appendChild(ans);
      list.appendChild(row);
    });
  }

  window.revealAnswers = function () {
    document.querySelectorAll('.answer').forEach(function (el) { el.classList.add('visible'); });
    document.getElementById('btnReveal').disabled = true;
  };

  window.resetToSetup = function () { teardownTrainingKeys(); showPanel('setup'); };

  applyGradePreset();
})();
</script>
</body>
</html>
