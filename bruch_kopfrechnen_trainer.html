<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kopfrechnen: Bruchrechnung</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 1rem 0;
  }

  .container {
    width: min(560px, 92vw);
    text-align: center;
  }

  h1 {
    font-size: 1.55rem;
    font-weight: 700;
    margin-bottom: 0.35rem;
    color: #93c5fd;
  }

  .subtitle {
    font-size: 0.82rem;
    color: #94a3b8;
    margin-bottom: 1.25rem;
    line-height: 1.45;
  }

  .setup { display: flex; flex-direction: column; gap: 1rem; }

  .field {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    background: #1e293b;
    padding: .85rem 1.1rem;
    border-radius: .75rem;
    flex-wrap: wrap;
  }

  .field.field-column {
    flex-direction: column;
    align-items: stretch;
    text-align: left;
  }

  .field label.field-main {
    font-size: .95rem;
    font-weight: 600;
    white-space: nowrap;
  }

  .field .inputs { display: flex; align-items: center; gap: .5rem; flex-wrap: wrap; }

  select {
    min-height: 2.5rem;
    padding: .4rem .65rem;
    border: 2px solid #334155;
    border-radius: .5rem;
    background: #0f172a;
    color: #e2e8f0;
    font-size: 1rem;
    outline: none;
    cursor: pointer;
  }
  select:focus { border-color: #60a5fa; }

  input[type="number"] {
    width: 4.25rem;
    padding: .45rem .5rem;
    border: 2px solid #334155;
    border-radius: .5rem;
    background: #0f172a;
    color: #e2e8f0;
    font-size: 1rem;
    text-align: center;
    outline: none;
    transition: border-color .2s;
  }
  input[type="number"].wide { width: 5rem; }
  input[type="number"]:focus { border-color: #60a5fa; }

  .sep { color: #64748b; font-weight: 600; }

  .type-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.45rem 0.75rem;
    margin-top: 0.35rem;
    font-size: 0.88rem;
  }

  .type-grid label {
    display: flex;
    align-items: center;
    gap: 0.45rem;
    cursor: pointer;
    color: #cbd5e1;
  }

  .type-grid input { accent-color: #3b82f6; width: 1rem; height: 1rem; }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: .5rem;
    padding: .75rem 2rem;
    border: none;
    border-radius: .6rem;
    font-size: 1.05rem;
    font-weight: 600;
    cursor: pointer;
    transition: background .2s, transform .1s;
  }
  .btn:active { transform: scale(.97); }

  .btn-primary {
    background: #3b82f6;
    color: #fff;
    margin-top: .35rem;
  }
  .btn-primary:hover { background: #2563eb; }

  .btn-secondary {
    background: #334155;
    color: #e2e8f0;
  }
  .btn-secondary:hover { background: #475569; }

  .btn-success {
    background: #22c55e;
    color: #fff;
  }
  .btn-success:hover { background: #16a34a; }

  .display { display: none; flex-direction: column; align-items: center; gap: 1.6rem; }

  .task-text {
    font-size: clamp(1.75rem, 8vw, 4.25rem);
    font-weight: 800;
    letter-spacing: .03em;
    color: #f8fafc;
    min-height: 2.5em;
    line-height: 1.2;
    padding: 0 0.25rem;
    word-break: break-word;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .task-text.compact { font-size: clamp(1.5rem, 7vw, 3.5rem); }

  .expr-row {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: 0.35em;
    vertical-align: middle;
  }

  .frac-stack {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    vertical-align: middle;
    margin: 0 0.08em;
    line-height: 1.05;
    font-variant-numeric: tabular-nums;
  }

  .frac-stack .frac-num {
    border-bottom: 2px solid currentColor;
    padding: 0 0.2em 0.06em;
    min-width: 1ch;
    text-align: center;
  }

  .frac-stack .frac-den {
    padding: 0.06em 0.2em 0;
    min-width: 1ch;
    text-align: center;
  }

  .num-plain,
  .op-plain {
    font-weight: 800;
    align-self: center;
  }

  .kbd-hint {
    font-size: 0.78rem;
    color: #64748b;
    margin-top: -0.5rem;
  }

  .progress-bar-wrap {
    width: 100%;
    height: 6px;
    background: #1e293b;
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: #3b82f6;
    border-radius: 3px;
    transition: width .3s linear;
  }

  .counter {
    font-size: .9rem;
    color: #94a3b8;
  }

  .results { display: none; flex-direction: column; align-items: center; gap: 1.4rem; }

  .results h2 {
    font-size: 1.3rem;
    color: #93c5fd;
  }

  .task-list {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: .55rem;
    max-height: min(55vh, 420px);
    overflow-y: auto;
  }

  .task-row {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: .5rem;
    flex-wrap: wrap;
    background: #1e293b;
    padding: .65rem 1rem;
    border-radius: .6rem;
    font-size: clamp(0.95rem, 3.5vw, 1.15rem);
    font-weight: 600;
    text-align: left;
  }

  .task-row .prompt-part {
    color: #e2e8f0;
    display: inline-flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 0.25em;
  }

  .task-row .frac-stack {
    font-size: 1.05em;
  }

  .task-row .answer {
    color: #22c55e;
    visibility: hidden;
    font-weight: 700;
    display: inline-flex;
    align-items: center;
  }
  .task-row .answer.visible { visibility: visible; }

  .btn-group {
    display: flex;
    gap: .8rem;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: .4rem;
  }
</style>
<link rel="stylesheet" href="assets/style.css">
</head>
<body class="mst-page">
<nav class="mst-nav" aria-label="Hauptnavigation">
  <a href="index.html" class="mst-nav__link">Zur Übersicht</a>
</nav>

<div class="container">
  <h1>Kopfrechnen: Bruchrechnung</h1>
  <p class="subtitle" id="presetHint">Preset für Klassenstufe 5 — alle Werte unten sind anpassbar.</p>

  <div class="setup" id="setup">
    <div class="field">
      <label class="field-main" for="grade">Klassenstufe</label>
      <div class="inputs">
        <select id="grade" aria-describedby="presetHint">
          <option value="5">5</option>
          <option value="6">6</option>
          <option value="7">7</option>
          <option value="8">8</option>
          <option value="9">9</option>
          <option value="10">10</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label class="field-main">Nenner-Bereich</label>
      <div class="inputs">
        <input type="number" id="minDenom" value="2" min="2" max="60" title="Minimalnenner">
        <span class="sep">bis</span>
        <input type="number" id="maxDenom" value="10" min="2" max="60" title="Maximalnenner">
      </div>
    </div>

    <div class="field">
      <label class="field-main" for="maxLcm">Max. kgV (ungleichnamig)</label>
      <div class="inputs">
        <input type="number" id="maxLcm" class="wide" value="12" min="6" max="120" title="Obere Grenze für kgV bei Addition ungleichnamiger Brüche">
      </div>
    </div>

    <div class="field">
      <label class="field-main">Anzahl Aufgaben</label>
      <div class="inputs">
        <input type="number" id="taskCount" value="10" min="1" max="50">
      </div>
    </div>

    <div class="field">
      <label class="field-main">Anzeigedauer (Sek.)</label>
      <div class="inputs">
        <input type="number" id="duration" value="6" min="1" max="30" step="1">
      </div>
    </div>

    <div class="field field-column">
      <span class="field-main">Aufgabentypen</span>
      <div class="type-grid">
        <label><input type="checkbox" id="type_anteil" checked> Anteil („a/b von G“)</label>
        <label><input type="checkbox" id="type_same"> Gleicher Nenner (+/−)</label>
        <label><input type="checkbox" id="type_unequal"> Ungleicher Nenner (+/−)</label>
        <label><input type="checkbox" id="type_muldiv"> · oder : mit ganzer Zahl</label>
        <label><input type="checkbox" id="type_complement" checked> 1 − a/b</label>
        <label><input type="checkbox" id="type_plusWhole"> Bruch + ganze Zahl</label>
        <label><input type="checkbox" id="type_decimal"> Bruch ± Dezimal (0,25 …)</label>
        <label><input type="checkbox" id="type_twostep"> Zwei Schritte (Punkt vor Strich)</label>
        <label><input type="checkbox" id="type_negatives"> Negative Zahlen</label>
      </div>
    </div>

    <button type="button" class="btn btn-primary" onclick="startTraining()">Start</button>
  </div>

  <div class="display" id="display">
    <div class="counter" id="counter"></div>
    <div class="task-text" id="taskText"></div>
    <p class="kbd-hint">Leertaste: nächste Aufgabe · Esc: abbrechen</p>
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>
  </div>

  <div class="results" id="results">
    <h2>Übersicht</h2>
    <div class="task-list" id="taskList"></div>
    <div class="btn-group">
      <button type="button" class="btn btn-success" id="btnReveal" onclick="revealAnswers()">Lösungen anzeigen</button>
      <button type="button" class="btn btn-secondary" onclick="resetToSetup()">Neu starten</button>
    </div>
  </div>
</div>

<script>
(function () {
  'use strict';

  const GRADE_PRESETS = {
    5: {
      maxDenominator: 10,
      minDenominator: 2,
      maxLcm: 12,
      defaultTaskCount: 10,
      defaultDuration: 6,
      types: {
        anteil: true,
        same: false,
        unequal: false,
        muldiv: false,
        complement: true,
        plusWhole: false,
        decimal: false,
        twostep: false,
        negatives: false,
      },
    },
    6: {
      maxDenominator: 16,
      minDenominator: 2,
      maxLcm: 36,
      defaultTaskCount: 10,
      defaultDuration: 5,
      types: {
        anteil: true,
        same: true,
        unequal: true,
        muldiv: true,
        complement: true,
        plusWhole: true,
        decimal: true,
        twostep: false,
        negatives: false,
      },
    },
    7: {
      maxDenominator: 18,
      minDenominator: 2,
      maxLcm: 48,
      defaultTaskCount: 10,
      defaultDuration: 5,
      types: {
        anteil: true,
        same: true,
        unequal: true,
        muldiv: true,
        complement: true,
        plusWhole: true,
        decimal: true,
        twostep: false,
        negatives: true,
      },
    },
    8: {
      maxDenominator: 20,
      minDenominator: 2,
      maxLcm: 60,
      defaultTaskCount: 12,
      defaultDuration: 5,
      types: {
        anteil: true,
        same: true,
        unequal: true,
        muldiv: true,
        complement: true,
        plusWhole: true,
        decimal: true,
        twostep: true,
        negatives: true,
      },
    },
    9: {
      maxDenominator: 20,
      minDenominator: 2,
      maxLcm: 60,
      defaultTaskCount: 12,
      defaultDuration: 4,
      types: {
        anteil: true,
        same: true,
        unequal: true,
        muldiv: true,
        complement: true,
        plusWhole: true,
        decimal: true,
        twostep: true,
        negatives: true,
      },
    },
    10: {
      maxDenominator: 20,
      minDenominator: 2,
      maxLcm: 60,
      defaultTaskCount: 14,
      defaultDuration: 4,
      types: {
        anteil: true,
        same: true,
        unequal: true,
        muldiv: true,
        complement: true,
        plusWhole: true,
        decimal: true,
        twostep: true,
        negatives: true,
      },
    },
  };

  const DECIMAL_TERMS = [
    { label: '0,25', num: 1, den: 4 },
    { label: '0,5', num: 1, den: 2 },
    { label: '0,75', num: 3, den: 4 },
    { label: '0,2', num: 1, den: 5 },
    { label: '0,4', num: 2, den: 5 },
  ];

  let tasks = [];
  let timer = null;
  let sequenceSkip = null;
  let sequenceAbort = null;

  function gcd(a, b) {
    a = Math.abs(a);
    b = Math.abs(b);
    while (b) {
      const t = b;
      b = a % b;
      a = t;
    }
    return a || 1;
  }

  function lcm(a, b) {
    return Math.abs(a * b) / gcd(a, b);
  }

  function reduceFrac(n, d) {
    if (d === 0) return [0, 1];
    const sign = (n < 0) !== (d < 0) ? -1 : 1;
    n = Math.abs(n);
    d = Math.abs(d);
    const g = gcd(n, d);
    return [sign * (n / g), d / g];
  }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function plainNumHtml(n) {
    return '<span class="num-plain">' + escapeHtml(String(n)) + '</span>';
  }

  function opPlain(text) {
    return '<span class="op-plain">' + escapeHtml(text) + '</span>';
  }

  function fracStackHtml(numerator, denominator) {
    const [rn, rd] = reduceFrac(numerator, denominator);
    if (rd === 1) return plainNumHtml(rn);
    const neg = rn < 0;
    const an = Math.abs(rn);
    const stack =
      '<span class="frac-stack"><span class="frac-num">' +
      escapeHtml(String(an)) +
      '</span><span class="frac-den">' +
      escapeHtml(String(rd)) +
      '</span></span>';
    return (neg ? '<span class="num-plain">−</span>' : '') + stack;
  }

  function exprRow(innerHtml) {
    return '<span class="expr-row">' + innerHtml + '</span>';
  }

  function approxTextLen(html) {
    return html.replace(/<[^>]*>/g, '').length;
  }

  function randInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  function applyGradePreset() {
    const g = String(document.getElementById('grade').value);
    const p = GRADE_PRESETS[g];
    if (!p) return;

    document.getElementById('maxDenom').value = p.maxDenominator;
    document.getElementById('minDenom').value = p.minDenominator;
    document.getElementById('maxLcm').value = p.maxLcm;
    document.getElementById('taskCount').value = p.defaultTaskCount;
    document.getElementById('duration').value = p.defaultDuration;

    Object.keys(p.types).forEach(function (key) {
      const el = document.getElementById('type_' + key);
      if (el) el.checked = p.types[key];
    });

    document.getElementById('presetHint').textContent =
      'Preset für Klassenstufe ' + g + ' — alle Werte unten sind anpassbar.';
  }

  document.getElementById('grade').addEventListener('change', applyGradePreset);

  function readBounds() {
    let minD = Math.max(2, parseInt(document.getElementById('minDenom').value, 10) || 2);
    let maxD = Math.max(minD, parseInt(document.getElementById('maxDenom').value, 10) || minD);
    const maxLcmVal = Math.max(6, parseInt(document.getElementById('maxLcm').value, 10) || 36);
    const allowNeg = document.getElementById('type_negatives').checked;
    return { minD: minD, maxD: maxD, maxLcmVal: maxLcmVal, allowNeg: allowNeg };
  }

  function genAnteil(bounds) {
    const n = randInt(bounds.minD, bounds.maxD);
    const a = randInt(1, n - 1);
    const mult = randInt(2, 12);
    const G = n * mult;
    return {
      promptHtml: exprRow(
        fracStackHtml(a, n) + opPlain(' von ') + plainNumHtml(G)
      ),
      answerHtml: plainNumHtml(a * mult),
    };
  }

  function genSameDenom(bounds) {
    const d = randInt(bounds.minD, bounds.maxD);
    const cap = Math.min(14, d * 3);
    let a = randInt(1, cap);
    let b = randInt(1, cap);
    const add = randInt(0, 1) === 1;
    let num;
    let opSym;
    if (add) {
      num = a + b;
      opSym = '+';
    } else {
      if (!bounds.allowNeg && a < b) {
        const t = a;
        a = b;
        b = t;
      }
      num = a - b;
      opSym = '−';
    }
    if (!bounds.allowNeg && num < 0) return null;
    return {
      promptHtml: exprRow(
        fracStackHtml(a, d) + opPlain(' ' + opSym + ' ') + fracStackHtml(b, d)
      ),
      answerHtml: fracStackHtml(num, d),
    };
  }

  function genUnequalDenom(bounds) {
    for (let tries = 0; tries < 90; tries++) {
      const d1 = randInt(bounds.minD, bounds.maxD);
      const d2 = randInt(bounds.minD, bounds.maxD);
      if (d1 === d2) continue;
      const L = lcm(d1, d2);
      if (L > bounds.maxLcmVal) continue;
      const a = randInt(1, d1 - 1);
      const b = randInt(1, d2 - 1);
      const add = randInt(0, 1) === 1;
      const n1 = a * (L / d1);
      const n2 = b * (L / d2);
      let num = add ? n1 + n2 : n1 - n2;
      if (!bounds.allowNeg && num < 0) continue;
      const opSym = add ? '+' : '−';
      return {
        promptHtml: exprRow(
          fracStackHtml(a, d1) + opPlain(' ' + opSym + ' ') + fracStackHtml(b, d2)
        ),
        answerHtml: fracStackHtml(num, L),
      };
    }
    return null;
  }

  function genMulDiv(bounds) {
    const d = randInt(bounds.minD, bounds.maxD);
    const a = randInt(1, d - 1);
    const multiply = randInt(0, 1) === 1;
    if (multiply) {
      let k = randInt(2, 9);
      if (bounds.allowNeg && randInt(0, 1) === 1) k = -k;
      const rn = reduceFrac(a * k, d)[0];
      if (Math.abs(rn) > 48) return null;
      return {
        promptHtml: exprRow(
          fracStackHtml(a, d) + opPlain(' · ') + plainNumHtml(k)
        ),
        answerHtml: fracStackHtml(a * k, d),
      };
    }
    const k = randInt(2, 9);
    const den = d * k;
    if (den > 72) return null;
    return {
      promptHtml: exprRow(
        fracStackHtml(a, d) + opPlain(' : ') + plainNumHtml(k)
      ),
      answerHtml: fracStackHtml(a, den),
    };
  }

  function genComplement(bounds) {
    const b = randInt(bounds.minD, bounds.maxD);
    const a = randInt(1, b - 1);
    return {
      promptHtml: exprRow(
        plainNumHtml(1) + opPlain(' − ') + fracStackHtml(a, b)
      ),
      answerHtml: fracStackHtml(b - a, b),
    };
  }

  function genPlusWhole(bounds) {
    const d = randInt(bounds.minD, bounds.maxD);
    const a = randInt(1, d - 1);
    let k = randInt(2, 18);
    if (bounds.allowNeg && randInt(0, 1) === 1) k = -k;
    const before = randInt(0, 1) === 1;
    const num = a + k * d;
    if (!bounds.allowNeg && num < 0) return null;
    let promptHtml;
    if (before) {
      promptHtml = exprRow(
        plainNumHtml(k) + opPlain(' + ') + fracStackHtml(a, d)
      );
    } else {
      promptHtml = exprRow(
        fracStackHtml(a, d) + opPlain(' + ') + plainNumHtml(k)
      );
    }
    return {
      promptHtml: promptHtml,
      answerHtml: fracStackHtml(num, d),
    };
  }

  function genDecimalMix(bounds) {
    for (let tries = 0; tries < 60; tries++) {
      const dec = DECIMAL_TERMS[randInt(0, DECIMAL_TERMS.length - 1)];
      const d = randInt(bounds.minD, bounds.maxD);
      const a = randInt(1, d - 1);
      const add = randInt(0, 1) === 1;
      const L = lcm(d, dec.den);
      const nA = a * (L / d);
      const nD = dec.num * (L / dec.den);
      let num = add ? nA + nD : nA - nD;
      if (num <= 0 || num >= L) continue;
      const opSym = add ? '+' : '−';
      return {
        promptHtml: exprRow(
          fracStackHtml(a, d) +
            opPlain(' ' + opSym + ' ') +
            opPlain(dec.label)
        ),
        answerHtml: fracStackHtml(num, L),
      };
    }
    return null;
  }

  function genTwoStep(bounds) {
    const d = randInt(bounds.minD, Math.min(bounds.maxD, 12));
    const a = randInt(1, d - 1);
    const c = randInt(1, Math.min(d - 1, 6));
    const k = randInt(2, 5);
    const num = a + c * k;
    if (!bounds.allowNeg && num < 0) return null;
    if (num > 4 * d) return null;
    return {
      promptHtml: exprRow(
        fracStackHtml(a, d) +
          opPlain(' + ') +
          fracStackHtml(c, d) +
          opPlain(' · ') +
          plainNumHtml(k)
      ),
      answerHtml: fracStackHtml(num, d),
    };
  }

  const generators = {
    anteil: genAnteil,
    same: genSameDenom,
    unequal: genUnequalDenom,
    muldiv: genMulDiv,
    complement: genComplement,
    plusWhole: genPlusWhole,
    decimal: genDecimalMix,
    twostep: genTwoStep,
  };

  function collectEnabledTypes() {
    const keys = ['anteil', 'same', 'unequal', 'muldiv', 'complement', 'plusWhole', 'decimal', 'twostep'];
    return keys.filter(function (k) {
      const el = document.getElementById('type_' + k);
      return el && el.checked;
    });
  }

  function generateOne(enabledTypes, bounds) {
    const key = enabledTypes[randInt(0, enabledTypes.length - 1)];
    const fn = generators[key];
    if (!fn) return null;
    return fn(bounds);
  }

  window.startTraining = function () {
    const enabled = collectEnabledTypes();
    if (enabled.length === 0) {
      window.alert('Bitte mindestens einen Aufgabentyp auswählen.');
      return;
    }

    const count = Math.max(1, parseInt(document.getElementById('taskCount').value, 10) || 10);
    const dur = Math.max(1, parseInt(document.getElementById('duration').value, 10) || 5);
    const bounds = readBounds();

    tasks = [];
    for (let i = 0; i < count; i++) {
      let t = null;
      for (let tries = 0; tries < 120 && !t; tries++) {
        t = generateOne(enabled, bounds);
      }
      if (!t) {
        t = genAnteil(bounds);
      }
      tasks.push(t);
    }

    showPanel('display');
    runSequence(dur);
  };

  function showPanel(id) {
    ['setup', 'display', 'results'].forEach(function (s) {
      document.getElementById(s).style.display = s === id ? 'flex' : 'none';
    });
  }

  function teardownTrainingKeys() {
    clearTimeout(timer);
    timer = null;
    window.removeEventListener('keydown', onTrainingKeydown);
    sequenceSkip = null;
    sequenceAbort = null;
  }

  function onTrainingKeydown(e) {
    if (document.getElementById('display').style.display !== 'flex') return;
    if (e.code === 'Space') {
      e.preventDefault();
      if (sequenceSkip) sequenceSkip();
    } else if (e.code === 'Escape') {
      e.preventDefault();
      if (sequenceAbort) sequenceAbort();
    }
  }

  function runSequence(dur) {
    teardownTrainingKeys();

    let displayIndex = 0;
    const total = tasks.length;
    const taskText = document.getElementById('taskText');
    const counter = document.getElementById('counter');
    const bar = document.getElementById('progressBar');

    function presentTask() {
      clearTimeout(timer);
      timer = null;

      if (displayIndex >= total) {
        teardownTrainingKeys();
        showResults();
        return;
      }

      const t = tasks[displayIndex];
      taskText.innerHTML = t.promptHtml;
      taskText.classList.toggle('compact', approxTextLen(t.promptHtml) > 14);

      counter.textContent = 'Aufgabe ' + (displayIndex + 1) + ' von ' + total;
      bar.style.transition = 'none';
      bar.style.width = '100%';

      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          bar.style.transition = 'width ' + dur + 's linear';
          bar.style.width = '0%';
        });
      });

      displayIndex++;
      timer = setTimeout(presentTask, dur * 1000);
    }

    sequenceSkip = function () {
      clearTimeout(timer);
      timer = null;
      presentTask();
    };

    sequenceAbort = function () {
      teardownTrainingKeys();
      showPanel('setup');
    };

    window.addEventListener('keydown', onTrainingKeydown);
    presentTask();
  }

  function showResults() {
    teardownTrainingKeys();

    showPanel('results');
    const list = document.getElementById('taskList');
    list.innerHTML = '';
    document.getElementById('btnReveal').disabled = false;

    tasks.forEach(function (t) {
      const row = document.createElement('div');
      row.className = 'task-row';
      const promptSpan = document.createElement('span');
      promptSpan.className = 'prompt-part';
      promptSpan.innerHTML = t.promptHtml + '<span class="op-plain"> = </span>';
      const ans = document.createElement('span');
      ans.className = 'answer';
      ans.innerHTML = t.answerHtml;
      row.appendChild(promptSpan);
      row.appendChild(ans);
      list.appendChild(row);
    });
  }

  window.revealAnswers = function () {
    document.querySelectorAll('.answer').forEach(function (el) {
      el.classList.add('visible');
    });
    document.getElementById('btnReveal').disabled = true;
  };

  window.resetToSetup = function () {
    teardownTrainingKeys();
    showPanel('setup');
  };

  applyGradePreset();
})();
</script>
</body>
</html>
